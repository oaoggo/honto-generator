<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🎨 Honto Prompt to Image</title>
</head>
<body>
  <h2>🎨 프롬프트로 이미지 생성</h2>
  <input type="text" id="promptInput" placeholder="프롬프트 입력" style="width: 300px;">
  <button onclick="generateImage()">생성</button>
  <p id="resultText"></p>
  <img id="resultImage" style="max-width: 512px; display:none;" />

  <script>
    async function generateImage() {
      const prompt = document.getElementById('promptInput').value;

      const res = await fetch("https://honto-generator.onrender.com/generate", {  // ✅ Render 주소
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();
      console.log("응답 데이터:", data);  // 콘솔 확인

      const resultText = document.getElementById("resultText");
      const resultImage = document.getElementById("resultImage");

      if (data.result) {
        resultText.textContent = "✅ 이미지 생성 성공!";
        resultImage.src = data.result;
        resultImage.style.display = "block";
      } else {
        resultText.textContent = "❌ 오류 발생: " + (data.error || "응답 오류");
        resultImage.style.display = "none";
      }
    }
  </script>
</body>
</html>
